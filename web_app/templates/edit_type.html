<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактирование типа ковра</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
        }
        h1 { margin-bottom: 20px; color: #333; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        textarea { resize: vertical; min-height: 80px; }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✏️ Редактирование типа ковра</h1>
        
        <form method="POST">
            <div class="form-group">
                <label>Название типа *:</label>
                <input type="text" name="name" value="{{ type.name }}" required>
            </div>
            
            <div class="form-group">
                <label>Базовая цена (₽) *:</label>
                <input type="number" name="base_price" step="1" value="{{ type.base_price }}" required>
            </div>
            
            <div class="form-group">
                <label>Описание:</label>
                <textarea name="description">{{ type.description or '' }}</textarea>
            </div>
            
            <div class="btn-group">
                <button type="submit" class="btn-primary">💾 Сохранить</button>
                <a href="{{ url_for('types_list') }}"><button type="button" class="btn-secondary">❌ Отмена</button></a>
            </div>
        </form>
    </div>
</body>
</html>
