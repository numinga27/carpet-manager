<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактирование ковра</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }
        h1 { margin-bottom: 20px; color: #333; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        textarea { resize: vertical; min-height: 80px; }
        .readonly-field {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 8px;
            color: #666;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .qr-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }
        .qr-section img { max-width: 150px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✏️ Редактирование ковра</h1>
        
        <div class="form-group">
            <label>ID ковра (не редактируется):</label>
            <div class="readonly-field">{{ carpet.carpet_id }}</div>
        </div>
        
        <form method="POST">
            <div class="form-group">
                <label>Тип ковра *:</label>
                <select name="carpet_type_id" required>
                    {% for type in carpet_types %}
                    <option value="{{ type.id }}" {% if carpet.carpet_type_id == type.id %}selected{% endif %}>
                        {{ type.name }} - {{ type.base_price }} ₽
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label>Швея *:</label>
                <select name="craftsman_id" required>
                    {% for craftsman in craftsmen %}
                    <option value="{{ craftsman.id }}" {% if carpet.craftsman_id == craftsman.id %}selected{% endif %}>
                        {{ craftsman.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label>Цена *:</label>
                <input type="number" name="price" step="1000" value="{{ carpet.price }}" required>
            </div>
            
            <div class="form-group">
                <label>Размер:</label>
                <input type="text" name="size" value="{{ carpet.size or '' }}" placeholder="2x3 м">
            </div>
            
            <div class="form-group">
                <label>Материал:</label>
                <input type="text" name="material" value="{{ carpet.material or '' }}" placeholder="Шерсть, Хлопок...">
            </div>
            
            <div class="form-group">
                <label>Цвет:</label>
                <input type="text" name="color" value="{{ carpet.color or '' }}" placeholder="Красный, Синий...">
            </div>
            
            <div class="form-group">
                <label>Дата создания *:</label>
                <input type="date" name="date_created" value="{{ carpet.date_created }}" required>
            </div>
            
            <div class="form-group">
                <label>Примечания:</label>
                <textarea name="notes" placeholder="Дополнительная информация...">{{ carpet.notes or '' }}</textarea>
            </div>
            
            <div class="btn-group">
                <button type="submit" class="btn-primary">💾 Сохранить</button>
                <a href="/"><button type="button" class="btn-secondary">❌ Отмена</button></a>
            </div>
        </form>
        
        {% if carpet.qr_code_path %}
        <div class="qr-section">
            <h3>📱 QR-код ковра:</h3>
            <img src="/get_qr/{{ carpet.carpet_id }}" alt="QR-код">
            <p><small>QR-код обновится автоматически после сохранения</small></p>
        </div>
        {% endif %}
    </div>
</body>
</html>
