<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактирование аккаунта - Ковровый учёт</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            text-align: center;
        }
        .content { padding: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }
        .checkbox-group input {
            width: auto;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        .btn-save {
            flex: 1;
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-cancel {
            flex: 1;
            padding: 12px;
            background: #95a5a6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }
        .info-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>✏️ Редактирование аккаунта</h1>
        <p>{{ account.marketplace|upper }} - {{ account.account_name }}</p>
    </div>
    
    <div class="content">
        <form method="POST">
            <div class="form-group">
                <label>Название аккаунта *</label>
                <input type="text" name="account_name" value="{{ account.account_name }}" required>
            </div>
            
            <div class="form-group">
                <label>Логин/Название магазина</label>
                <input type="text" name="account_login" value="{{ account.account_login or '' }}">
            </div>
            
            <div class="form-group">
                <label>API-ключ *</label>
                <input type="text" name="api_key" value="{{ account.api_key }}" required>
                <div class="info-text">Ключ API для доступа к заказам</div>
            </div>
            
            {% if account.marketplace == 'ozon' %}
            <div class="form-group">
                <label>Client ID (только для Ozon)</label>
                <input type="text" name="client_id" value="{{ account.client_id or '' }}">
            </div>
            {% endif %}
            
            <div class="checkbox-group">
                <input type="checkbox" name="is_active" id="is_active" {% if account.is_active %}checked{% endif %}>
                <label for="is_active">Аккаунт активен</label>
            </div>
            
            <div class="btn-group">
                <button type="submit" class="btn-save">💾 Сохранить</button>
                <a href="{{ url_for('marketplace_accounts') }}" class="btn-cancel">❌ Отмена</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
