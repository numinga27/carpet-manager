<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Печать QR-кода - {{ carpet.carpet_id }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .qr-card {
            background: white;
            width: 350px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            page-break-after: avoid;
            break-inside: avoid;
        }
        .qr-card h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 18px;
        }
        .qr-card .carpet-id {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
            font-family: monospace;
        }
        .qr-code {
            margin: 20px 0;
            padding: 15px;
            background: white;
            display: inline-block;
        }
        .qr-code img {
            width: 200px;
            height: 200px;
        }
        .info {
            text-align: left;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #555;
        }
        .info p {
            margin: 5px 0;
        }
        .print-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            .print-btn {
                display: none;
            }
            .qr-card {
                box-shadow: none;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="qr-card">
        <h2>🧵 КОВРОВЫЙ УЧЁТ</h2>
        <div class="carpet-id">{{ carpet.carpet_id }}</div>
        
        <div class="qr-code">
            <img src="/get_qr/{{ carpet.carpet_id }}" alt="QR-код">
        </div>
        
        <div class="info">
            <p><strong>Тип:</strong> {{ carpet.carpet_type_ref.name if carpet.carpet_type_ref else '-' }}</p>
            <p><strong>Швея:</strong> {{ carpet.craftsman_ref.name if carpet.craftsman_ref else '-' }}</p>
            <p><strong>Цена:</strong> {{ carpet.price }} ₽</p>
            <p><strong>Размер:</strong> {{ carpet.size or '-' }}</p>
            <p><strong>Дата создания:</strong> {{ carpet.date_created }}</p>
        </div>
    </div>
    
    <button class="print-btn" onclick="window.print()">🖨️ Печать</button>
    
    <script>
        // Автоматически открыть диалог печати
        setTimeout(() => {
            window.print();
        }, 500);
    </script>
</body>
</html>
