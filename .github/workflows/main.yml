name: Build Windows Executable

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        cd web_app
        pip install flask flask-sqlalchemy qrcode pillow reportlab requests

    - name: Build EXE
      run: |
        cd web_app
        pyinstaller --onefile --windowed --name="CarpetManager" `
          --hidden-import=reportlab `
          --hidden-import=reportlab.pdfgen `
          --hidden-import=reportlab.lib `
          --hidden-import=reportlab.lib.pagesizes `
          --hidden-import=reportlab.lib.units `
          --hidden-import=reportlab.lib.utils `
          --hidden-import=requests `
          app.py

    - name: Prepare release package
      run: |
        New-Item -ItemType Directory -Force -Path release
        Copy-Item "web_app\dist\CarpetManager.exe" -Destination "release\"
        # Копируем папку templates
        if (Test-Path "web_app\templates") {
            Copy-Item -Path "web_app\templates" -Destination "release\templates" -Recurse -Force
        }
        # Копируем папку Data если есть
        if (Test-Path "web_app\Data") {
            Copy-Item -Path "web_app\Data" -Destination "release\Data" -Recurse -Force
        }

    - name: Create ZIP
      run: |
        Compress-Archive -Path "release\*" -DestinationPath "CarpetManager.zip" -Force

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CarpetManager
        path: CarpetManager.zip