name: Build Windows Executable

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        cd web_app
        pip install flask flask-sqlalchemy qrcode pillow reportlab requests urllib3 certifi chardet idna
    
    - name: Build with PyInstaller
      run: |
        cd web_app
        pyinstaller --onedir --windowed --name="CarpetManager" `
          --add-data "templates;templates" `
          --hidden-import=reportlab `
          --hidden-import=reportlab.pdfgen `
          --hidden-import=reportlab.lib `
          --hidden-import=reportlab.lib.pagesizes `
          --hidden-import=reportlab.lib.units `
          --hidden-import=reportlab.lib.utils `
          --hidden-import=requests `
          --hidden-import=urllib3 `
          --hidden-import=chardet `
          --hidden-import=idna `
          --hidden-import=certifi `
          --collect-all=requests `
          --collect-all=urllib3 `
          app.py
    
    - name: Create ZIP package
      run: |
        Compress-Archive -Path web_app/dist/CarpetManager -DestinationPath CarpetManager.zip
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CarpetManagerPackage
        path: CarpetManager.zip