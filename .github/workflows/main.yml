name: Build Windows Executable

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install flask flask-sqlalchemy qrcode pillow reportlab opencv-python pyzbar numpy
    
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name="CarpetManager" --add-data "templates;templates" app.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CarpetManager
        path: dist/CarpetManager.exe